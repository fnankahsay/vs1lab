<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main">
        <section class="main__tagging tagging">
            <h2>Tagging</h2>

            <!-- ############### VS1Lab 1a Form 1 Start -->
            <form id="tag-form" action="/tagging" method="post">
                <fieldset>
                    <legend>Add new Geo-Tag</legend>

                    <div class="form-field">
                        <label for="t-lat">Latitude (Fixed)</label>

                        <input
                        type="text"
                        id="t-lat"
                        name="latitude"
                        value="49.01379"
                        readonly>
                    </div>

                    <div class="form-field">
                        <label for="t-lon">Longitude (Fixed)</label>

                        <input
                        type="text"
                        id="t-lon"
                        name="longitude"
                        value="8.390071"
                        readonly>
                    </div>

                    <div class="form-field">
                        <label for="t-name">Name (Required)</label>

                        <input
                        type="text"
                        id="t-name"
                        name="name"
                        required
                        placeholder="e.g Europapl."
                        maxlength="10">
                    </div>

                    <div class="form-field">
                        <label for="t-hash">Hashtag (Optional)</label>

                        <input
                        type="text"
                        id="t-hash"
                        name="hashtag"
                        pattern="#[A-Za-z]{1-10}"
                        maxlength="11"
                        placeholder="e.g #Euro">
                    </div>

                    <button type="submit" class="submit-button">
                        Add Tag
                    </button>
                </fieldset>

            </form>
            <!-- ############### VS1Lab 1a Form 1 End -->

        </section>

        <section class="main__discovery discovery">
            <h2 class="discovery__title">Discovery</h2>

            <!-- ############### VS1Lab 1a Form 2 Start -->
            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">
                <fieldset>
                    <legend>Search</legend>

                    <div class="form-field">
                        <label for="search">
                            Search-term (Name or Hashtag)
                        </label>

                        <input
                        type="text"
                        id="search"
                        name="search"
                        maxlength="11"
                        placeholder="e.g Europapl. or #Euro">
                    </div>

                    <div class="display-none">
                        <label for="s-lat">Latitude</label>

                        <input
                        type="text"
                        id="s-lat"
                        name="latitude">
                    </div>

                    <div class="display-none">
                        <label for="s-lon">Longitude</label>

                        <input
                        type="text"
                        id="s-lon"
                        name="longitude">
                    </div>

                    <button type="submit" class="submit-button">
                        Search
                    </button>
                </fieldset>
            </form>
            <!-- ############### VS1Lab 1a Form 2 End -->

            <div class="discovery__wrapper">
                <div class="discovery__taglist">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>
